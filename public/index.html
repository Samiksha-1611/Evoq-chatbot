<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVOQ</title>
  <link rel="icon" href="https://i.ibb.co/F57MGN0/ai-1.png" type="image/png">
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://use.fontawesome.com/releases/v5.5.0/css/all.css" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="style.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <link href="https://use.fontawesome.com/releases/v5.5.0/css/all.css" rel="stylesheet">
</head>

<body>
  <!-- ============ LOADING SCREEN ============ -->
  <div id="loadingScreen">

    <div class="loader-wrapper">

      <img src="https://i.ibb.co/F57MGN0/ai-1.png" class="loader-logo">

      <h1 class="loader-title">EVOQ</h1>

      <div class="loader-dot"></div>

      <p id="loaderMessage">
        Initializing AI Assistant...
      </p>

      <div class="progress-bar">

        <div id="progressFill"></div>

      </div>

      <span id="progressText">
        0%
      </span>

    </div>

  </div>
  <!-- ============ AUTH SCREENS ============ -->

  <!-- Login Screen -->
  <div id="loginScreen" class="auth-screen">
    <div class="auth-container">
      <div class="auth-header">
        <img src="https://i.ibb.co/F57MGN0/ai-1.png" alt="EVOQ" class="auth-logo">
        <h1>Welcome Back</h1>
        <p>Sign in to continue</p>
      </div>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="loginUsername">Username</label>
          <input type="text" id="loginUsername" placeholder="Enter username" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" required>
        </div>
        <button type="submit" class="auth-btn">Sign In</button>
        <p class="auth-switch">
          Don't have an account? <a href="#" id="showRegister">Register</a>
        </p>
        <div id="loginError" class="auth-error"></div>
      </form>
    </div>
  </div>

  <!-- Register Screen -->
  <div id="registerScreen" class="auth-screen" style="display:none;">
    <div class="auth-container">
      <div class="auth-header">
        <img src="https://i.ibb.co/F57MGN0/ai-1.png" alt="EVOQ" class="auth-logo">
        <h1>Create Account</h1>
        <p>Start your journey with EVOQ</p>
      </div>

      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="registerUsername">Username</label>
          <input type="text" id="registerUsername" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
          <label for="registerPassword">Password</label>
          <input type="password" id="registerPassword" placeholder="Create a password" required>
        </div>
        <button type="submit" class="auth-btn">Create Account</button>
        <p class="auth-switch">
          Already have an account? <a href="#" id="showLogin">Sign In</a>
        </p>
        <div id="registerError" class="auth-error"></div>
      </form>
    </div>
  </div>

  <!-- ============ MAIN APP (Hidden until logged in) ============ -->
  <div id="appContainer" style="display:none;">

    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <img src="https://i.ibb.co/F57MGN0/ai-1.png" alt="EVOQ" class="header-logo">
        <h1>EVOQ</h1>
      </div>
      <div class="header-right">
        <button id="newChatBtn" class="header-btn">
          <i class="fas fa-plus"></i> <span>New</span>
        </button>
        <button id="historyButton" class="header-btn" title="History">
          <i class="fas fa-history"></i>
        </button>
        <span id="userDisplay" class="user-badge">
          <i class="fas fa-user"></i> <span id="usernameDisplay">User</span>
        </span>
        <button id="logoutBtn" class="header-btn logout-btn" title="Logout">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </div>

    <!-- Chat Container -->
    <div id="chatContainer" class="chat-container"></div>

    <!-- Welcome Container -->
    <div id="welcomeContainer" class="welcome-container">
      <div class="welcome-card">
        <div class="welcome-icon">
          <img src="https://i.ibb.co/F57MGN0/ai-1.png" alt="EVOQ" class="welcome-logo">
        </div>
        <h1 class="welcome-title">Hi, I'm EVOQ</h1>
        <p class="welcome-subtitle">Your intelligent AI assistant. How can I help you today?</p>
      </div>
    </div>
    <!-- History Modal -->
    <div id="historySidebar" class="history-sidebar">

      <div class="history-header">

        <h2>
          <i class="fas fa-comments"></i>
          History
        </h2>

        <button id="closeHistory">

          <i class="fas fa-times"></i>

        </button>

      </div>

      <div id="historyList" class="history-list">
      </div>

      <button id="sidebarNewChat" class="sidebar-new-chat">

        <i class="fas fa-plus"></i>

        New Conversation

      </button>

    </div>

    <div id="sidebarOverlay"></div>
    <!-- Footer -->
    <div class="footer">
      <div class="input-container">
        <input type="text" id="text" placeholder="Ask me anything" autocomplete="off" required>
        <button id="attachment"><i class="fas fa-paperclip"></i></button>
        <button id="send"><i class="fas fa-location-arrow"></i></button>
      </div>
      <div class="voice-controls">
        <button onclick="speakText()"><i class="fas fa-volume-up"></i></button>
        <button id="pauseResumeBtn" onclick="togglePauseResume()"><i class="fas fa-pause"></i></button>
        <button onclick="cancelSpeech()"><i class="fas fa-stop"></i></button>
      </div>
      <input type="file" id="fileInput" style="display: none;" accept="image/*,.pdf,.doc,.docx,.txt">
    </div>
  </div>

  <!-- JavaScript -->
  <script src="script.js"></script>
</body>

</html>
